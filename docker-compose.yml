version: '3.8'

networks:
  db-data-net:
    driver: bridge

volumes:
  db-data:

services:
  pythonapp:
    image: app:1.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
       - APP_ENV=Development
       - DB_HOST=mysql
       - DB_USER=app_user
       - DB_PASSWORD=1234
       - DB_NAME=app_db
    networks:
      - db-data-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:1.0
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=app_db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=1234
    networks:
      - db-data-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app_user", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 5
